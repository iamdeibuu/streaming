<!DOCTYPE html>
<html>
<head>
    <title>Live Stream</title>
    <style>
        body {
            margin: 0;
            background: #e8dfcf;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        iframe {
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe width="800" height="450"
        src="https://www.youtube.com/embed/bdkqDCS18x0"
        allowfullscreen>
    </iframe>

    <button onclick="logout()">Logout</button>

<script>
    // protect page (redirect if not logged in)
    if (localStorage.getItem("loggedIn") !== "true") {
        window.location.href = "index.html";
    }

    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
